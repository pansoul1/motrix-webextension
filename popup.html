<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motrix Download Manager</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 头部 -->
    <header class="header">
      <div class="header-left">
        <img src="icons/icon48.png" alt="logo" class="logo">
        <h1>Motrix WebExtension</h1>
      </div>
      <label class="switch">
        <input type="checkbox" id="toggleEnabled" checked>
        <span class="slider"></span>
      </label>
    </header>

    <!-- 状态指示 -->
    <div class="status-bar" id="statusBar">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">已启用</span>
    </div>

    <!-- 最近状态（由后台推送/读取） -->
    <div class="status-panel" id="statusPanel" style="display:none">
      <div class="status-panel-title" id="statusPanelTitle"></div>
      <div class="status-panel-message" id="statusPanelMessage"></div>
    </div>

    <!-- RPC 设置 -->
    <section class="section">
      <h2 class="section-title">RPC 设置</h2>
      <div class="form-group">
        <label for="rpcUrl">RPC 地址</label>
        <input type="text" id="rpcUrl" placeholder="http://localhost:16800/jsonrpc">
      </div>
      <div class="form-group">
        <label for="rpcSecret">RPC 密钥</label>
        <input type="password" id="rpcSecret" placeholder="留空表示无密钥">
      </div>
      <button class="btn btn-secondary" id="testBtn">测试连接</button>
      <div class="test-result" id="testResult"></div>
    </section>

    <!-- 过滤设置 -->
    <section class="section">
      <h2 class="section-title">过滤设置</h2>
      <div class="form-group">
        <label for="fileExtensions">拦截扩展名</label>
        <input type="text" id="fileExtensions" placeholder="留空拦截所有，如 zip,exe,dmg,iso">
      </div>
      <div class="form-group">
        <label for="minFileSize">最小文件大小 (KB)</label>
        <input type="number" id="minFileSize" placeholder="0 表示不限制" min="0">
      </div>
      <div class="form-group">
        <label class="checkbox">
          <input type="checkbox" id="fallbackToBrowser" checked>
          <span>Motrix 不可用时恢复浏览器下载</span>
        </label>
      </div>
      <div class="form-group">
        <label class="checkbox">
          <input type="checkbox" id="showMotrixOnSuccess" checked>
          <span>下载成功后自动唤起 Motrix 到前台</span>
        </label>
      </div>
    </section>

    <!-- 手动下载 -->
    <section class="section">
      <h2 class="section-title">手动下载</h2>
      <div class="form-group">
        <input type="text" id="manualUrl" placeholder="输入下载链接 URL">
      </div>
      <button class="btn btn-primary" id="downloadBtn">发送到 Motrix</button>
      <div class="download-result" id="downloadResult"></div>
    </section>

    <!-- 保存按钮 -->
    <button class="btn btn-save" id="saveBtn">保存设置</button>

    <!-- 底部 -->
    <footer class="footer">
      <span>v1.0.0 · by <a href="https://github.com/pansoul1" target="_blank">Pansoul</a></span>
      <a href="https://github.com/pansoul1/motrix-webextension" target="_blank">GitHub</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
